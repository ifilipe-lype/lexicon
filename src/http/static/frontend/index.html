<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexicon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary-color: #64748b;
            --background-color: #f8fafc;
            --card-background: #ffffff;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --error-color: #dc2626;
            --success-color: #059669;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --border-radius: 8px;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin:0; padding:0; background: linear-gradient(135deg, var(--background-color) 0%, #e2e8f0 100%);
            color: var(--text-color); line-height: 1.6; min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
        header { text-align: center; margin-bottom: 3rem; }
        .logo { font-size: 2.5rem; font-weight: 700; color: var(--primary-color); margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .logo::before { content: "📚"; font-size: 2rem; }
        .subtitle { color: var(--text-muted); font-size: 1.1rem; font-weight: 400; }
        .search-section { background: var(--card-background); padding: 2rem; border-radius: var(--border-radius); box-shadow: var(--shadow); margin-bottom: 2rem; }
        .search-form { display: flex; gap:1rem; align-items: center; flex-wrap: wrap; }
        #wordInput { flex: 1; min-width: 200px; padding: 0.75rem 1rem; font-size: 1rem; border: 2px solid var(--border-color); border-radius: var(--border-radius); transition: border-color 0.2s, box-shadow 0.2s; font-family: inherit; }
        #wordInput:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        #wordInput::placeholder { color: var(--text-muted); }
        button { padding: 0.75rem 1.5rem; font-size: 1rem; font-weight: 500; background: var(--primary-color); color: white; border: none; border-radius: var(--border-radius); cursor: pointer; transition: background-color 0.2s, transform 0.1s; display: flex; align-items: center; gap: 0.5rem; font-family: inherit; }
        button:hover { background: var(--primary-hover); }
        button:active { transform: translateY(1px); }
        button::before { content: "🔍"; }
        #voiceButton { padding: 0.75rem 1rem; background: var(--secondary-color); min-width: 50px; justify-content: center; }
        #voiceButton:hover { background: #4b5563; }
        #voiceButton.listening { background: #dc2626; animation: pulse 1.5s infinite; }
        #voiceButton::before { content: ""; }
        .loading { display: none; align-items: center; gap: 0.5rem; color: var(--secondary-color); font-style: italic; margin-top: 1rem; }
        .spinner { width: 16px; height: 16px; border: 2px solid var(--border-color); border-top: 2px solid var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .result-section { background: var(--card-background); padding: 2rem; border-radius: var(--border-radius); box-shadow: var(--shadow); opacity: 0; transform: translateY(20px); transition: opacity 0.3s, transform 0.3s; }
        .result-section.show { opacity: 1; transform: translateY(0); }
        .result-section.error { border-left: 4px solid var(--error-color); }
        .result-section.success { border-left: 4px solid var(--success-color); }
        .word-title { font-size: 2rem; font-weight: 700; color: var(--primary-color); margin-bottom: 1.5rem; text-align: center; text-transform: capitalize; }
        .definition { margin-bottom: 2rem; }
        .definition h3 { font-size: 1.5rem; font-weight: 600; color: var(--primary-color); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .definition h3::before { content: "📖"; }
        .definition p { font-size: 1.1rem; line-height: 1.7; color: var(--text-color); }
        .examples { margin-bottom: 0; }
        .examples h3 { font-size: 1.25rem; font-weight: 600; color: var(--primary-color); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .examples h3::before { content: "💡"; }
        .examples ul { list-style: none; padding: 0; margin: 0; }
        .examples li { padding: 0.75rem 1rem; background: var(--background-color); border-radius: var(--border-radius); margin-bottom: 0.5rem; border-left: 3px solid var(--primary-color); font-style: italic; transition: background-color 0.2s; }
        .examples li:hover { background: #e2e8f0; }
        .error-message { color: var(--error-color); font-weight: 500; display: flex; align-items: center; gap: 0.5rem; font-size: 1.1rem; }
        .error-message::before { content: "⚠️"; }
        .voice-status { width: 100%; margin-top: 0.5rem; font-size: 0.9rem; color: var(--secondary-color); font-style: italic; min-height: 1.2rem; }
        .voice-status.listening { color: #dc2626; font-weight: 500; }
        .voice-status.error { color: var(--error-color); }
        @media (max-width: 768px) {
            .container { padding: 1rem 0.5rem; }
            .logo { font-size: 2rem; }
            .search-form { flex-direction: column; align-items: stretch; }
            #wordInput { min-width: auto; }
            button { justify-content: center; }
            .search-section, .result-section { padding: 1.5rem; }
            .word-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo">Lexicon</h1>
            <p class="subtitle">Discover word meanings and usage examples</p>
        </header>
        <main>
            <section class="search-section">
                <form class="search-form" onsubmit="event.preventDefault(); fetchWord();">
                    <input type="text" id="wordInput" placeholder="Enter or speak a word to explore (min 3 characters)" required>
                    <button type="submit" id="searchButton">Search</button>
                    <button type="button" id="voiceButton" title="Speak a word">
                        <span id="voiceIcon">🎤</span>
                    </button>
                </form>
                <div id="voiceStatus" class="voice-status"></div>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    Exploring word...
                </div>
            </section>
            <section class="result-section" id="resultSection">
                <h2 class="word-title" id="wordTitle"></h2>
                <div class="definition">
                    <h3>Definition</h3>
                    <p id="definition"></p>
                </div>
                <div class="examples">
                    <h3>Example Sentences</h3>
                    <ul id="examplesList"></ul>
                </div>
            </section>
        </main>
    </div>
    <script>
        let recognition = null;
        let isListening = false;

        async function fetchWord() {
            const wordInput = document.getElementById('wordInput');
            const searchButton = document.getElementById('searchButton');
            const loading = document.getElementById('loading');
            const resultSection = document.getElementById('resultSection');
            const wordTitle = document.getElementById('wordTitle');
            const definition = document.getElementById('definition');
            const examplesList = document.getElementById('examplesList');
            const word = wordInput.value.trim();

            resultSection.className = 'result-section';
            wordTitle.textContent = '';
            definition.textContent = '';
            examplesList.innerHTML = '';
            loading.style.display = 'none';

            if (word.length < 3) {
                resultSection.classList.add('error');
                wordTitle.textContent = 'Input Error';
                definition.innerHTML = '<div class="error-message">Please enter at least 3 characters</div>';
                resultSection.classList.add('show');
                return;
            }

            loading.style.display = 'flex';
            searchButton.disabled = true;
            wordInput.disabled = true;

            try {
                const response = await fetch(`/search?word=${encodeURIComponent(word)}`);
                if (!response.ok) throw new Error(`Error: ${response.statusText}`);
                const data = await response.json();
                loading.style.display = 'none';
                searchButton.disabled = false;
                wordInput.disabled = false;
                resultSection.classList.add('success', 'show');
                wordTitle.textContent = word;
                definition.textContent = data.definition;
                examplesList.innerHTML = data.examples.map((example, i) => `<li>${i+1}. ${example}</li>`).join('');
            } catch (error) {
                loading.style.display = 'none';
                searchButton.disabled = false;
                wordInput.disabled = false;
                resultSection.classList.add('error', 'show');
                wordTitle.textContent = 'Error';
                definition.innerHTML = `<div class="error-message">${error.message}</div>`;
                examplesList.innerHTML = '';
            }
        }

        document.getElementById('wordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') fetchWord();
        });

        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return null;
            const recog = new SpeechRecognition();
            recog.lang = 'en-US';
            recog.interimResults = false;
            recog.maxAlternatives = 1;
            recog.continuous = false;
            recog.onresult = (event) => {
                const transcript = event.results[0][0].transcript.trim();
                const voiceStatus = document.getElementById('voiceStatus');
                voiceStatus.textContent = `Recognized: "${transcript}"`;
                const word = transcript.split(/\s+/)[0].replace(/[^\w]/g, '');
                if (word.length >= 3) {
                    document.getElementById('wordInput').value = word;
                    fetchWord();
                } else {
                    voiceStatus.textContent = `Word "${word}" is too short. Try again.`;
                    voiceStatus.className = 'voice-status error';
                }
                stopVoiceInput();
            };
            recog.onerror = (event) => {
                const voiceStatus = document.getElementById('voiceStatus');
                if (event.error === 'not-allowed') voiceStatus.textContent = 'Microphone access denied. Please allow microphone permissions.';
                else if (event.error === 'no-speech') voiceStatus.textContent = 'No speech detected. Try again.';
                else voiceStatus.textContent = `Error: ${event.error}`;
                voiceStatus.className = 'voice-status error';
                stopVoiceInput();
            };
            recog.onend = () => { if (isListening) stopVoiceInput(); };
            return recog;
        }

        function toggleVoiceInput() {
            if (!recognition) recognition = initSpeechRecognition();
            if (!recognition) return;
            if (isListening) { stopVoiceInput(); return; }
            isListening = true;
            const voiceButton = document.getElementById('voiceButton');
            const voiceIcon = document.getElementById('voiceIcon');
            const voiceStatus = document.getElementById('voiceStatus');
            voiceButton.classList.add('listening');
            voiceIcon.textContent = '🛑';
            voiceStatus.textContent = 'Listening... Speak now.';
            voiceStatus.className = 'voice-status listening';
            try { recognition.start(); } catch (e) { recognition.stop(); setTimeout(() => recognition.start(), 100); }
        }

        function stopVoiceInput() {
            if (recognition && isListening) { try { recognition.stop(); } catch(e) {} }
            isListening = false;
            const voiceButton = document.getElementById('voiceButton');
            const voiceIcon = document.getElementById('voiceIcon');
            const voiceStatus = document.getElementById('voiceStatus');
            voiceButton.classList.remove('listening');
            voiceIcon.textContent = '🎤';
            voiceStatus.textContent = '';
            voiceStatus.className = 'voice-status';
        }

        window.addEventListener('load', () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                const voiceButton = document.getElementById('voiceButton');
                voiceButton.disabled = true;
                voiceButton.title = 'Voice input not supported in this browser';
                voiceButton.style.opacity = '0.5';
                const voiceStatus = document.getElementById('voiceStatus');
                voiceStatus.textContent = 'Voice input not supported. Try Chrome or Edge.';
                voiceStatus.className = 'voice-status error';
            }
        });

        document.getElementById('voiceButton').addEventListener('click', toggleVoiceInput);
    </script>
</body>
</html>
